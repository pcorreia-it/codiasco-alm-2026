<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codiasco — Academy on Labour Migration 2026</title>
<style>
/* ============ CODIASCO DESIGN SYSTEM — tokens (fonte: assets/colori/tokens-colori.css, confermati 11/07/2026) ============ */
:root{
  --cdc-nero:#363636; --cdc-verde:#3d8e42; --cdc-rosso:#ce1c1e; --cdc-grigio:#cbcbcb; --cdc-bianco:#ffffff;
  --cdc-dati:var(--cdc-verde);
  --cdc-grigio-10:#f4f4f4; /* derivato chiaro del grigio per fondi sottili */
  --ff:'Inter',Helvetica,Arial,sans-serif; /* TIP-1 (Inter = segnaposto confermato per web/slide) */
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--ff);background:#1d1d1d;color:var(--cdc-nero);overflow:hidden}
/* ============ DECK CHROME ============ */
#deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;display:none;flex-direction:column;background:var(--cdc-bianco);padding:4.5vh 5vw 8vh}
.slide.active{display:flex}
.slide.dark{background:var(--cdc-nero);color:var(--cdc-bianco)}
.kicker{font-size:1.5vh;letter-spacing:.18em;text-transform:uppercase;color:var(--cdc-verde);font-weight:600;margin-bottom:1.2vh}
.slide.dark .kicker{color:var(--cdc-grigio)}
h1.headline{font-size:4.6vh;line-height:1.16;font-weight:800;color:var(--cdc-verde);max-width:82%;margin-bottom:1vh}
.slide.dark h1.headline{color:var(--cdc-bianco)}
h1.headline .rosso{color:var(--cdc-rosso)}
.slide.dark h1.headline .rosso{color:#ff6b6b}
.subline{font-size:2.1vh;color:var(--cdc-nero);opacity:.85;max-width:70%;margin-bottom:2vh}
.slide.dark .subline{color:var(--cdc-bianco)}
.vis{flex:1;display:flex;align-items:center;justify-content:center;min-height:0} /* 60–70% visual */
.interp{font-size:2vh;max-width:75%;margin-top:1.6vh}
.src{position:absolute;bottom:5.2vh;left:5vw;font-size:1.35vh;color:#8a8a8a}
.slide.dark .src{color:var(--cdc-grigio)}
.brand{position:absolute;bottom:5.2vh;right:5vw;height:2.6vh;opacity:.9}
.brand img{height:100%}
/* progress + hud */
#bar{position:fixed;left:0;bottom:0;height:.6vh;background:var(--cdc-verde);width:0;transition:width .25s;z-index:50}
#hud{position:fixed;bottom:1.2vh;left:50%;transform:translateX(-50%);display:flex;gap:1.6vh;align-items:center;font-size:1.5vh;color:#999;z-index:50;background:rgba(20,20,20,.65);color:#ddd;padding:.5vh 1.4vh;border-radius:2vh}
#hud b{color:#fff}
#hud .lang{cursor:pointer;padding:.1vh .8vh;border-radius:1vh;border:1px solid #666}
#hud .lang.on{background:var(--cdc-verde);border-color:var(--cdc-verde);color:#fff;font-weight:700}
#timer.warn{color:#ffb3b3;font-weight:700}
/* notes */
#notes{position:fixed;right:0;top:0;bottom:0;width:34vw;background:#111;color:#eee;padding:3vh 2vw;overflow:auto;display:none;z-index:60;font-size:1.8vh;line-height:1.5;border-left:3px solid var(--cdc-verde)}
#notes h3{color:var(--cdc-verde);margin-bottom:1vh;font-size:1.9vh}
#notes .fr{color:#9ecbff}#notes .en{color:#b8e6b8}
#notes p{margin-bottom:1.2vh}
/* help */
#help{position:fixed;left:1vw;bottom:3.5vh;font-size:1.3vh;color:#888;z-index:50}
/* ============ FAMIGLIA A — identità ============ */
.photo-ph{background:repeating-linear-gradient(45deg,var(--cdc-grigio-10),var(--cdc-grigio-10) 12px,#ececec 12px,#ececec 24px);border:2px dashed var(--cdc-grigio);display:flex;align-items:center;justify-content:center;color:#777;font-size:1.7vh;text-align:center;padding:2vh;border-radius:6px}
.cover-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:3vw;flex:1;min-height:0;align-items:center}
.presenters{display:flex;flex-direction:column;gap:1.6vh}
.presenter{display:flex;align-items:center;gap:1.2vw}
.presenter .dot{width:1.4vh;height:1.4vh;border-radius:50%;background:var(--cdc-verde);flex:none}
.presenter b{font-size:2.2vh}.presenter span{font-size:1.7vh;color:var(--cdc-grigio)}
.rules{font-size:1.6vh;color:var(--cdc-grigio);margin-top:2.5vh}
/* ============ PLURAL PATH MAP ============ */
.ppm{display:grid;grid-template-columns:2.2fr 1fr;gap:2.5vw;width:100%;height:100%;min-height:0}
.ppm-levels{display:flex;flex-direction:column;justify-content:center;gap:1vh}
.lvl{display:flex;align-items:center;gap:1vw;cursor:pointer;padding:1.1vh 1.2vw;border-radius:8px;border:1.5px solid var(--cdc-grigio);transition:all .2s;background:#fff}
.lvl:hover{border-color:var(--cdc-verde)}
.lvl.on{background:var(--cdc-verde);border-color:var(--cdc-verde);color:#fff}
.lvl .n{font-weight:800;font-size:2vh;width:2.6vh;height:2.6vh;border-radius:50%;background:var(--cdc-grigio-10);color:var(--cdc-nero);display:flex;align-items:center;justify-content:center;flex:none;font-size:1.5vh}
.lvl.on .n{background:#fff;color:var(--cdc-verde)}
.lvl .t{font-size:1.9vh;font-weight:600}
.ppm-detail{border-left:3px solid var(--cdc-verde);padding-left:1.5vw;display:flex;flex-direction:column;justify-content:center;gap:1vh}
.ppm-detail h4{color:var(--cdc-verde);font-size:2.1vh}
.ppm-detail .row{font-size:1.65vh;line-height:1.35}
.ppm-detail .row b{color:var(--cdc-rosso);font-weight:700;display:block;font-size:1.35vh;text-transform:uppercase;letter-spacing:.08em}
.ppm-stats{grid-column:1/-1;display:flex;gap:2vw;justify-content:center;border-top:1px solid var(--cdc-grigio);padding-top:1.4vh}
.stat{text-align:center}
.stat .v{font-size:3.4vh;font-weight:800;color:var(--cdc-verde);font-variant-numeric:tabular-nums}
.stat .l{font-size:1.4vh;color:#777;text-transform:uppercase;letter-spacing:.06em}
/* ============ FAMIGLIA B — dati ============ */
.gap-vis{display:flex;gap:4vw;align-items:flex-end;height:80%}
.gap-col{display:flex;flex-direction:column;align-items:center;gap:1vh;flex:1;height:100%;justify-content:flex-end}
.gap-col .box{width:100%;border-radius:6px 6px 0 0}
.gap-col .lab{font-size:1.8vh;font-weight:600;text-align:center}
.bars{display:flex;gap:5vw;align-items:flex-end;height:75%;padding:0 6vw}
.barwrap{display:flex;flex-direction:column;align-items:center;gap:1vh;flex:1;height:100%;justify-content:flex-end}
.bar-v{font-size:5vh;font-weight:800;font-variant-numeric:tabular-nums}
.bar{width:70%;border-radius:6px 6px 0 0}
.bar-l{font-size:1.8vh;text-align:center;color:var(--cdc-nero)}
/* iceberg */
.ice-wrap{display:flex;width:100%;height:100%;gap:2vw;align-items:center}
.ice-svg{height:100%;flex:1.3}
.ice-side{flex:1;display:flex;flex-direction:column;gap:1.2vh;justify-content:center}
.ice-num{font-size:6.2vh;font-weight:800;color:var(--cdc-verde);font-variant-numeric:tabular-nums;line-height:1}
.ice-num small{font-size:2vh;color:var(--cdc-nero);font-weight:600;display:block;margin-top:.6vh}
.ice-ctx{font-size:1.7vh;color:#666}
/* ============ FAMIGLIA C — tempo/livelli ============ */
.tl{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;gap:2vh}
.tl-track{position:relative;height:.5vh;background:var(--cdc-grigio);border-radius:3px;margin:0 3vw}
.tl-fill{position:absolute;left:0;top:0;bottom:0;background:var(--cdc-verde);border-radius:3px;width:0;transition:width .4s}
.tl-stops{display:flex;justify-content:space-between;margin:0 3vw;position:relative}
.tl-stop{flex:1;text-align:center;cursor:pointer;padding-top:1.6vh;position:relative}
.tl-stop::before{content:'';position:absolute;top:-1.35vh;left:50%;transform:translateX(-50%);width:1.6vh;height:1.6vh;border-radius:50%;background:var(--cdc-grigio);border:3px solid #fff;transition:all .3s}
.tl-stop.major::before{width:2.4vh;height:2.4vh;top:-1.75vh}
.tl-stop.on::before{background:var(--cdc-verde)}
.tl-stop .y{font-weight:800;font-size:2vh}
.tl-stop.major .y{color:var(--cdc-verde);font-size:2.6vh}
.tl-stop .e{font-size:1.5vh;color:#777;max-width:14vw;margin:0 auto}
.tl-stage{min-height:11vh;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:.6vh}
.tl-stage .big{font-size:3vh;font-weight:700;color:var(--cdc-nero)}
.tl-stage .det{font-size:1.9vh;color:#666;max-width:70%;margin:0 auto}
.tl-ctrl{display:flex;gap:1vw;justify-content:center}
.tl-ctrl button{font-family:var(--ff);font-size:1.7vh;padding:.7vh 1.6vh;border:1.5px solid var(--cdc-verde);background:#fff;color:var(--cdc-verde);border-radius:5px;cursor:pointer;font-weight:600}
.tl-ctrl button:hover{background:var(--cdc-verde);color:#fff}
/* livelli (slide 9) */
.lv9{display:flex;flex-direction:column;gap:.9vh;width:100%;justify-content:center;height:100%}
.lv9 .r{display:grid;grid-template-columns:16vw 1fr 1fr 1fr;gap:1vw;align-items:center;padding:1vh 1.2vw;border-radius:8px;background:var(--cdc-grigio-10)}
.lv9 .r .name{font-weight:800;font-size:1.8vh;color:var(--cdc-verde)}
.lv9 .r .c{font-size:1.5vh;line-height:1.3}
.lv9 .r .c b{display:block;font-size:1.2vh;text-transform:uppercase;letter-spacing:.07em;color:var(--cdc-rosso)}
.lv9 .hdr{background:none;padding-bottom:0}
.lv9 .hdr .c b{color:#999}
/* ============ FAMIGLIA D — progetti ============ */
.case{display:grid;grid-template-columns:1.05fr .95fr;gap:2.5vw;width:100%;height:100%;min-height:0}
.case .steps{display:flex;flex-direction:column;gap:1vh;justify-content:center}
.case .step{padding-left:1.2vw;border-left:3px solid var(--cdc-grigio)}
.case .step b{display:block;font-size:1.3vh;text-transform:uppercase;letter-spacing:.08em;color:var(--cdc-verde)}
.case .step span{font-size:1.75vh}
.case .step.hot{border-color:var(--cdc-rosso)}
.case .step.hot b{color:var(--cdc-rosso)}
.duo{display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr;gap:1.5vh 1.5vw;width:100%;height:100%;min-height:0}
.duo .main{grid-row:1/3;display:flex;flex-direction:column;gap:1vh}
.duo .main .photo-ph{flex:1}
.duo .card{background:var(--cdc-grigio-10);border-radius:8px;padding:1.6vh 1.4vw;display:flex;flex-direction:column;gap:.5vh;justify-content:center}
.duo .card b{font-size:1.9vh}
.duo .card span{font-size:1.55vh;color:#666}
.duo .main .cap{font-size:1.9vh}
.duo .main .cap b{color:var(--cdc-verde)}
.recip{display:flex;flex-direction:column;gap:2vh;width:100%;height:100%;justify-content:center;align-items:center}
.recip .flow{display:flex;align-items:center;gap:2vw;font-size:2.6vh;font-weight:800}
.recip .flow .arr{color:var(--cdc-verde);font-size:5vh}
.recip .flow .terr{padding:1.6vh 2.4vw;border:2px solid var(--cdc-nero);border-radius:10px}
.chips{display:flex;flex-wrap:wrap;gap:1vh 1vw;justify-content:center;max-width:80%}
.chip{font-size:1.6vh;padding:.7vh 1.4vh;border-radius:2.4vh;border:1.5px solid var(--cdc-verde);color:var(--cdc-verde);font-weight:600}
.chip.proj{border-color:var(--cdc-nero);color:var(--cdc-nero);background:var(--cdc-grigio-10)}
.chips-cap{font-size:1.4vh;color:#888}
/* ============ FAMIGLIA E — chiusura ============ */
.cta-grid{display:grid;grid-template-columns:1fr .55fr;gap:3vw;flex:1;min-height:0;align-items:center}
.cta-list{display:flex;flex-direction:column;gap:2.2vh}
.cta-item{display:flex;gap:1.4vw;align-items:flex-start}
.cta-item .k{font-size:3.2vh;line-height:1;flex:none;width:4.5vh;height:4.5vh;border-radius:50%;background:var(--cdc-verde);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:2vh}
.cta-item b{font-size:2.4vh;display:block}
.cta-item span{font-size:1.8vh;color:var(--cdc-grigio)}
.qr-box{background:#fff;border-radius:10px;padding:2vh;display:flex;flex-direction:column;align-items:center;gap:1vh;color:var(--cdc-nero)}
.qr-ph{width:20vh;height:20vh;background:repeating-conic-gradient(#363636 0 25%,#fff 0 50%) 0 0/4vh 4vh;border:4px solid #fff;outline:2px dashed var(--cdc-grigio)}
.qr-box b{font-size:1.7vh}
.sec-band{font-size:1.45vh;color:var(--cdc-grigio);border-top:1px solid #555;padding-top:1.2vh;margin-top:1vh}
/* static/print fallback */
@media print{
  body{overflow:visible;background:#fff}
  .slide{display:flex !important;position:relative;height:100vh;page-break-after:always}
  #hud,#bar,#help,#notes{display:none !important}
  .tl-ctrl{display:none}
}
body.static-mode{overflow:auto}
body.static-mode .slide{display:flex;position:relative;height:100vh}
body.static-mode #hud,body.static-mode #bar{display:none}
</style>
</head>

let cur=0, lang='en';
const deck=document.getElementById('deck');
S.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide fam-'+s.fam+(s.dark?' dark':'');
  el.dataset.i=i;
  el.innerHTML=`<div class="kicker" data-en="${esc(s.kick.en)}" data-fr="${esc(s.kick.fr)}"></div>
    <h1 class="headline" data-en="${esc(s.h.en)}" data-fr="${esc(s.h.fr)}"></h1>
    ${s.interp?`<div class="subline" data-en="${esc(s.interp.en)}" data-fr="${esc(s.interp.fr)}"></div>`:''}
    <div class="vis">${s.body}</div>
    <div class="src" data-en="${esc(s.src.en)}" data-fr="${esc(s.src.fr)}"></div>
    <div class="brand"><img src="${s.dark?LOGO_NEG:LOGO_POS}" alt="Codiasco"></div>`;
  deck.appendChild(el);
});
function esc(t){return (t||'').replace(/"/g,'&quot;')}
function applyLang(){
  document.querySelectorAll('[data-en]').forEach(n=>{
    const v=n.dataset[lang]; if(v!==undefined){ if(n.tagName==='text'||n.classList.contains('i18n')){n.textContent=v.replace(/&amp;/g,'&');} else n.innerHTML=v; }});
  document.getElementById('lang-en').classList.toggle('on',lang==='en');
  document.getElementById('lang-fr').classList.toggle('on',lang==='fr');
  document.documentElement.lang=lang;
  renderPPM(ppmSel); renderTL(); renderLV9(); showNotes();
}
function setLang(l){lang=l;applyLang()}
function show(i){
  cur=Math.max(0,Math.min(S.length-1,i));
  document.querySelectorAll('.slide').forEach((el,j)=>el.classList.toggle('active',j===cur));
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('bar').style.width=((cur+1)/S.length*100)+'%';
  if(cur===4) tlStart(); else tlStop();
  showNotes();
  if(!t0 && cur>0) startTimer();
}
/* PPM */
let ppmSel=0;
function renderPPM(sel){
  ppmSel=sel;
  const L=document.getElementById('ppm-l'), D=document.getElementById('ppm-d'), ST=document.getElementById('ppm-s');
  if(!L)return;
  L.innerHTML=PPM_DATA.levels.map((l,i)=>`<div class="lvl${i===sel?' on':''}" onclick="renderPPM(${i})"><span class="n">${i+1}</span><span class="t">${l.t[lang]}</span></div>`).join('');
  const d=PPM_DATA.levels[sel].det;
  const lbl=lang==='en'?{pres:'Presence',proj:'Projects',part:'Partners',ev:'Evidence'}:{pres:'Présence',proj:'Projets',part:'Partenaires',ev:'Preuve'};
  D.innerHTML=`<h4>${PPM_DATA.levels[sel].t[lang]}</h4>
    <div class="row"><b>${lbl.pres}</b>${d.pres}</div>
    <div class="row"><b>${lbl.proj}</b>${d.proj}</div>
    <div class="row"><b>${lbl.part}</b>${d.part}</div>
    <div class="row"><b>${lbl.ev}</b>${d.ev[lang]||d.ev}</div>`;
  ST.innerHTML=PPM_DATA.stats.map(s=>`<div class="stat"><div class="v">${s.v}</div><div class="l">${s.l[lang]}</div></div>`).join('');
}
/* Timeline: auto 20s totali, controllabile */
let tlI=0, tlTimer=null, tlPlaying=true;
function renderTL(){
  const st=document.getElementById('tl-stops'); if(!st)return;
  st.innerHTML=TL.map((m,i)=>`<div class="tl-stop${m.major?' major':''}${i<=tlI?' on':''}" onclick="tlGo(${i})"><div class="y">${m.y}</div></div>`).join('');
  document.getElementById('tl-fill').style.width=(tlI/(TL.length-1)*100)+'%';
  const m=TL[tlI];
  document.getElementById('tl-stage').innerHTML=`<div class="big">${m.y}</div><div class="det">${m.e[lang]}</div>`;
}
function tlGo(i){tlI=i;renderTL()}
function tlNext(){tlI=(tlI+1)%TL.length;renderTL()}
function tlPrev(){tlI=(tlI-1+TL.length)%TL.length;renderTL()}
function tlToggle(){tlPlaying=!tlPlaying;document.getElementById('tl-play').textContent=tlPlaying?'⏸':'▶';if(tlPlaying)tlStart();else tlStop();}
function tlStart(){tlStop();if(tlPlaying)tlTimer=setInterval(tlNext, Math.round(20000/TL.length));renderTL();}
function tlStop(){if(tlTimer){clearInterval(tlTimer);tlTimer=null}}
/* Slide 9 */
function renderLV9(){
  const el=document.getElementById('lv9'); if(!el)return;
  const H=lang==='en'?['Agreement','Project','Result']:['Accord','Projet','Résultat'];
  const rows=[
   {n:{en:'Neighbourhood',fr:'Quartier'},a:'Sede Piazza della Repubblica 6',p:'Storie da Asporto',r:{en:'events + digital archive',fr:'événements + archives numériques'}},
   {n:{en:'City of Turin',fr:'Ville de Turin'},a:'Accordo Quadro 2023',p:'«Innovazione è competitività»',r:{en:'AI course + chatbot prototype',fr:'cours IA + prototype de chatbot'}},
   {n:{en:'Metropolitan City',fr:'Ville métropolitaine'},a:'Accordo quadro 2025',p:'[in definizione]',r:{en:'framework in force',fr:'cadre en vigueur'}},
   {n:{en:'Region',fr:'Région'},a:'Cabina di regia ECG',p:'Pra.TO (cofin. Regione)',r:{en:'«Diaspora e Cooperazione» 2024',fr:'«Diaspora e Cooperazione» 2024'}},
   {n:{en:'National',fr:'National'},a:'CIDCI — co-founder',p:'TILILA · TUAS · Draft the Future (AICS)',r:{en:'towards the National Diaspora Forum',fr:'vers le Forum national des diasporas'}},
   {n:{en:'International',fr:'International'},a:'Oxfam partnership 2025',p:'TILILA · Pra.TO · ALM (ITC-ILO, 2nd year)',r:{en:'Marrakech restitution 27/07',fr:'restitution à Marrakech 27/07'}}];
  el.innerHTML=`<div class="r hdr"><div class="name"></div><div class="c"><b>${H[0]}</b></div><div class="c"><b>${H[1]}</b></div><div class="c"><b>${H[2]}</b></div></div>`+
   rows.map(x=>`<div class="r"><div class="name">${x.n[lang]}</div><div class="c">${x.a}</div><div class="c">${x.p}</div><div class="c">${typeof x.r==='object'?x.r[lang]:x.r}</div></div>`).join('');
}
/* Notes */
let notesOn=false;
function showNotes(){
  const n=document.getElementById('notes');
  n.style.display=notesOn?'block':'none';
  if(notesOn) n.innerHTML=`<h3>Slide ${cur+1}/12 — note del relatore</h3><p>${S[cur].note}</p>`;
}
/* Timer */
let t0=null;
function startTimer(){t0=Date.now();setInterval(()=>{
  const s=Math.floor((Date.now()-t0)/1000), m=String(Math.floor(s/60)).padStart(2,'0'), ss=String(s%60).padStart(2,'0');
  const el=document.getElementById('timer'); el.textContent=m+':'+ss;
  el.classList.toggle('warn', s>=18*60+30);
},1000)}
/* Keys */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')show(cur+1);
  else if(e.key==='ArrowLeft')show(cur-1);
  else if(e.key==='Home')show(0); else if(e.key==='End')show(11);
  else if(e.key==='l'||e.key==='L')setLang(lang==='en'?'fr':'en');
  else if(e.key==='n'||e.key==='N'){notesOn=!notesOn;showNotes()}
  else if(e.key==='t'||e.key==='T'){if(!t0)startTimer()}
  else if(e.key==='f'||e.key==='F'){document.body.classList.toggle('static-mode')}
  else if(e.key==='p'||e.key==='P'){document.body.classList.add('static-mode');window.print()}
});
document.addEventListener('click',e=>{ if(e.target.closest('#hud,#notes,.lvl,.tl-ctrl,.tl-stop'))return; show(cur+1); });
/* init */
applyLang(); show(0); renderPPM(0);
</script>
</body>
</html>
