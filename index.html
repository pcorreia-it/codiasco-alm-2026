/* Cover corrections from browser review: keep the controls on one line,
   group the capability introduction with its list and reserve a clear
   footer lane for the source. */
.counter{display:flex;align-items:center;justify-content:center;gap:.18rem;white-space:nowrap;line-height:1}
.cover .stage{padding-bottom:clamp(3.75rem,6.5vh,5rem)}
.five-path>.path-intro{align-self:stretch;margin:0 0 .85rem}
@media(max-width:620px){.cover .stage{padding-bottom:0}}
/* Keep the three legal-sequence cards on one baseline even when their
   copy has different heights; arrows remain vertically centered. */
.law-layout{align-items:start;align-content:center}
.law-arr{align-self:center}
/* Each flow arrow is one continuous silhouette. The previous construction
   combined a skewed bar with a separate CSS triangle, exposing the seam. */
.river::before{left:0;right:0;height:3rem;transform:translateY(-50%);clip-path:polygon(0 30%,84% 30%,84% 7%,100% 50%,84% 93%,84% 70%,0 70%)}
.river.back::before{clip-path:polygon(16% 7%,16% 30%,100% 30%,100% 70%,16% 70%,16% 93%,0 50%)}
.river::after{display:none}
/* Migrant-led businesses comparison. Circle area, not diameter, encodes
   the values: sqrt(21/12) = 1.3229 is the diameter ratio. */
.dotplot{--italy-dot:clamp(4rem,5.2vw,5.5rem);--turin-dot:clamp(5.292rem,6.879vw,7.276rem)}
.dotplot .gridline{display:none}
.dot.italy{width:var(--italy-dot);height:var(--italy-dot)}
.dot.turin{width:var(--turin-dot);height:var(--turin-dot)}
.dotlabel{top:clamp(7rem,7.5vw,7.8rem);line-height:1.2}
.axis{height:1.25rem;align-items:flex-end;overflow:visible}
.axis-title{position:absolute;left:50%;bottom:0;transform:translateX(-50%);max-width:72%;font-family:var(--display);font-size:clamp(.68rem,.85vw,.84rem);font-weight:800;color:var(--ink);line-height:1.05;text-align:center}
/* Desktop timeline: markers mirror the alternating text blocks around the
   global axis. The active state changes emphasis, not geometry. */
@media(min-width:621px){
  .year:nth-child(odd)::after{top:calc(50% - 2.3rem)}
  .year:nth-child(even)::after{top:calc(50% - .7rem)}
  .year.on{transform:none}
}
/* Territorial logic expands from the most local scale to the widest one:
   neighbourhood at the core, international projects at the outer edge. */
.ring[data-order="1"]{inset:32.5%}
.ring[data-order="2"]{inset:26%}
.ring[data-order="3"]{inset:19.5%}
.ring[data-order="4"]{inset:13%}
.ring[data-order="5"]{inset:6.5%}
.ring[data-order="6"]{inset:0}
/* The comparison is now a centered proportional-bubble composition rather
   than a Cartesian plot. Axes disappear; the caption and labels carry the

.dotplot{border:0;padding:0}
.dotplot .dotrow{top:44%!important}
.dot.italy,.dotlabel.italy{left:35.5%}
.dot.turin,.dotlabel.turin{left:62.5%}
.dot.italy{background:#40555c;font-size:clamp(1.75rem,2.3vw,2.45rem);line-height:1;letter-spacing:-.04em}

 {c:'law',k:{en:'1 · Legal foundation',fr:'1 · Fondement juridique'},h:{en:'Italian law recognizes diaspora actors; Codiasco makes that recognition operational.',fr:'La loi italienne reconnaît les diasporas ; Codiasco rend cette reconnaissance opérationnelle.'},d:{en:'Participation is a right. Co-design is the missing practice.',fr:'La participation est un droit. La co-conception est la pratique manquante.'},src:{en:'Italian Law 125/2014, art. 26 · Codiasco mission and project practice',fr:'Loi italienne 125/2014, art. 26 · Mission et pratique de projet Codiasco'},note:{en:'1.5 min · Do not quantify the implementation gap without a verified source. The visual is an argument, not a chart.',fr:'1,5 min · Ne pas quantifier l’écart de mise en œuvre sans source vérifiée. Le visuel est un argument, pas un graphique.'},img:{en:'One documentary image only: Diaspora e Cooperazione 2024 or a City of Turin co-design training session. Favor a table-in-action over a posed group photograph.',fr:'Une seule image documentaire : Diaspora e Cooperazione 2024 ou une session de co-conception avec la Ville de Turin. Préférer une table de travail à une photo posée.'},body:l=>`<div class="law-layout"><article class="law-step"><strong>2014</strong><h3>${l==='en'?'Recognition':'Reconnaissance'}</h3><p>${l==='en'?'Migrant associations are named as development-cooperation actors.':'Les associations de migrants sont reconnues comme acteurs de la coopération au développement.'}</p></article><div class="law-arr">→</div><article class="law-step gap"><strong>GAP</strong><h3>${l==='en'?'Participation remains exceptional':'La participation reste exceptionnelle'}</h3><p>${l==='en'?'Recognition alone does not put diaspora knowledge at the decision table.':'La reconnaissance seule ne place pas le savoir diasporique à la table de décision.'}</p></article><div class="law-arr">→</div><article class="law-step"><strong>NOW</strong><h3>${l==='en'?'Co-design from the needs stage':'Co-concevoir dès l’analyse des besoins'}</h3><p>${l==='en'?'Codiasco brings languages, trust and two-territory networks before projects are written.':'Codiasco apporte langues, confiance et réseaux des deux territoires avant la rédaction des projets.'}</p></article></div>`},
 {c:'value',k:{en:'2 · Economic and social capital',fr:'2 · Capital économique et social'},h:{en:'€478m left Piedmont in 2025 — but money is only the visible return.',fr:'478 M€ ont quitté le Piémont en 2025 — mais l’argent n’est que le retour visible.'},d:{en:'Diasporas also move skills, trust, norms and professional networks.',fr:'Les diasporas font aussi circuler compétences, confiance, normes et réseaux professionnels.'},src:{en:'Banca d’Italia data via Torino Oggi, 24 May 2026 · World Bank–KNOMAD, 2024',fr:'Données Banca d’Italia via Torino Oggi, 24 mai 2026 · Banque mondiale–KNOMAD, 2024'},note:{en:'2 min · Read the two arrows as one system: money outward; organized social returns in both directions. Mention SDG 10.c only if useful to the group.',fr:'2 min · Lire les deux flèches comme un seul système : argent vers l’extérieur ; retours sociaux organisés dans les deux sens. Mentionner l’ODD 10.c si utile.'},img:{en:'Optional, not required: close documentary photograph of a real digital remittance or mobile-money interaction in a Moroccan or Senegalese community. No stock banknotes, flags or anonymous hands.',fr:'Facultatif : photo documentaire rapprochée d’une vraie opération de transfert numérique ou mobile money dans une communauté marocaine ou sénégalaise. Pas de billets, drapeaux ou mains anonymes de stock.'},body:l=>`<div class="flows"><div class="money-hero"><div class="num">€478m</div><div class="unit">${l==='en'?'remittances from Piedmont · 2025':'transferts depuis le Piémont · 2025'}</div><div class="context">US$685bn ${l==='en'?'to low- and middle-income countries worldwide in 2024':'vers les pays à revenu faible et intermédiaire dans le monde en 2024'}</div></div><div class="flow-field"><div class="flow-row"><div class="place">Piemonte</div><div class="river"><span>${l==='en'?'money · investment':'argent · investissement'}</span></div><div class="place right">${l==='en'?'Origin territories':'Territoires d’origine'}</div></div><div class="return-tags"><span>${l==='en'?'skills':'compétences'}</span><span>${l==='en'?'trust':'confiance'}</span><span>${l==='en'?'ideas':'idées'}</span><span>${l==='en'?'networks':'réseaux'}</span><span>${l==='en'?'culture':'culture'}</span></div><div class="flow-row"><div class="place">Piemonte</div><div class="river back"><span>${l==='en'?'organized social returns':'retours sociaux organisés'}</span></div><div class="place right">${l==='en'?'Origin territories':'Territoires d’origine'}</div></div></div></div>`},
 {c:'value',k:{en:'2 · Labour and local development',fr:'2 · Travail et développement local'},h:{en:'Migrant enterprise is structural in Turin; the next challenge is better work.',fr:'L’entrepreneuriat migrant est structurel à Turin ; le prochain défi est un travail de meilleure qualité.'},d:{en:'Codiasco connects local policy, diaspora needs and cooperation projects — it is not a direct employment service.',fr:'Codiasco relie politiques locales, besoins des diasporas et projets de coopération — ce n’est pas un service direct d’emploi.'},src:{en:'Dossier Statistico Immigrazione / Turin Chamber of Commerce, 2025',fr:'Dossier Statistico Immigrazione / Chambre de commerce de Turin, 2025'},note:{en:'2 min · Lead with 21% versus 12%, then change the question from access to quality. Tie the role to SDGs 8, 10 and 17 without turning them into decoration.',fr:'2 min · Commencer par 21 % contre 12 %, puis déplacer la question de l’accès vers la qualité. Relier le rôle aux ODD 8, 10 et 17 sans en faire une décoration.'},img:{en:'Portrait-in-context of a Nigerian or Peruvian entrepreneur in Turin — market, workshop, shop or professional setting. Show work and agency, not “migration”. Consent and business identification required.',fr:'Portrait en contexte d’un entrepreneur nigérian ou péruvien à Turin — marché, atelier, commerce ou cadre professionnel. Montrer le travail et l’action, pas « la migration ». Consentement et identification requis.'},body:l=>`<div class="work"><div class="dotplot" role="img" aria-label="21 percent Turin versus 12 percent Italy"><div class="gridline" style="top:32%"></div><div class="gridline" style="top:58%"></div><div class="dotrow" style="top:30%"><div class="dot turin">21%</div><div class="dotlabel turin">Torino<br>${l==='en'?'migrant-led businesses':'entreprises dirigées par des migrants'}</div><div class="dot italy">12%</div><div class="dotlabel italy">Italia<br>${l==='en'?'national average':'moyenne nationale'}</div></div><div class="axis"><span>0%</span><span>25%</span></div></div><div class="work-argument"><div class="quality">${l==='en'?'High participation does not yet mean high-quality employment.':'Une forte participation ne garantit pas encore un emploi de qualité.'}</div><div class="small-metrics"><div class="metric"><b>19.4%</b><span>${l==='en'?'of 2024 hires involved foreign workers':'des embauches 2024 concernaient des travailleurs étrangers'}</span></div><div class="metric"><b>77.7%</b><span>${l==='en'?'of foreign residents are of working age':'des résidents étrangers sont en âge de travailler'}</span></div></div><div class="policy-chain"><span>${l==='en'?'Local policy':'Politique locale'}</span><i></i><span>${l==='en'?'Diaspora needs':'Besoins des diasporas'}</span><i></i><span>${l==='en'?'Cooperation projects':'Projets de coopération'}</span></div><div class="sdgs"><span>SDG 8 · ${l==='en'?'Decent work':'Travail décent'}</span><span>SDG 10 · ${l==='en'?'Reduced inequalities':'Inégalités réduites'}</span><span>SDG 17 · ${l==='en'?'Partnerships':'Partenariats'}</span></div></div></div>`},
 {c:'network',k:{en:'3 · A federation, not a directory',fr:'3 · Une fédération, pas un annuaire'},h:{en:'A federation of 20 associations turns many communities into one negotiating voice.',fr:'Une fédération de 20 associations transforme plusieurs communautés en une seule voix de négociation.'},d:{en:'Its plural path runs from Porta Palazzo to national institutions and project territories.',fr:'Son parcours pluriel va de Porta Palazzo aux institutions nationales et aux territoires de projet.'},src:{en:'Codiasco members register · Plural Path Map dataset v0, audited 21 July 2026',fr:'Registre des membres Codiasco · Plural Path Map v0, audité le 21 juillet 2026'},note:{en:'2 min · The animation advances every 20 seconds. Let it run: neighbourhood → city → metropolitan → region → national → international. “20” means entries in the current register; validation of a possible duplicate remains an internal residual.',fr:'2 min · L’animation avance toutes les 20 secondes. La laisser dérouler : quartier → ville → métropole → région → national → international. « 20 » désigne les entrées du registre actuel.'},img:{en:'No photograph. Keep this as a native vector territorial diagram. If a map is later used, geocode only validated institutional addresses and label centroids as approximate.',fr:'Aucune photographie. Conserver un diagramme territorial vectoriel natif. Si une carte est ajoutée, géocoder uniquement les adresses institutionnelles validées et signaler les centroïdes comme approximatifs.'},body:l=>`<div class="ppm"><div class="orbit" id="orbit">${ppm.map((x,i)=>`<div class="ring" data-ppm="${i}" data-order="${i+1}" style="--inset:${i*6.5}%"></div>`).join('')}<div class="orbit-core">CODIASCO<br>20 ${l==='en'?'in register':'au registre'}</div></div><div class="ppm-copy"><div class="ppm-stage" id="ppmStage"></div><h3 id="ppmTitle"></h3><p id="ppmScope"></p><div class="ppm-evidence"><div><b>${l==='en'?'Action':'Action'}</b><span id="ppmEvidence"></span></div><div><b>${l==='en'?'Scale':'Échelle'}</b><span id="ppmOrder"></span></div></div><div class="autocue"><i></i><span>${L[l].auto}</span></div></div></div>`},
 {c:'network',k:{en:'3 · Capacity built over time',fr:'3 · Une capacité construite dans le temps'},h:{en:'In six years, Codiasco built the institutional chain that cooperation projects need.',fr:'En six ans, Codiasco a construit la chaîne institutionnelle nécessaire aux projets de coopération.'},d:{en:'The turning points are agreements, alliances and delivery — not anniversaries.',fr:'Les tournants sont des accords, des alliances et des réalisations — pas des anniversaires.'},src:{en:'Codiasco institutional archive and project records, 2020–2026',fr:'Archives institutionnelles et projets Codiasco, 2020–2026'},note:{en:'1.5 min · All milestones stay visible; the automatic highlight moves every 20 seconds. Stress the accumulation of capacity, not organizational age.',fr:'1,5 min · Tous les jalons restent visibles ; le surlignage automatique avance toutes les 20 secondes. Insister sur l’accumulation de capacité, pas sur l’âge de l’organisation.'},img:{en:'Optional archival insert after production: Terra Madre 2022 diaspora dialogue, or the 2023 City of Turin agreement signing. Use one small documentary crop attached to the relevant year, not a decorative montage.',fr:'Insertion d’archive facultative : dialogue des diasporas Terra Madre 2022 ou signature de l’accord avec Turin en 2023. Une seule petite image documentaire liée à l’année, pas un montage décoratif.'},body:l=>`<div class="timeline" id="timeline">${years.map((x,i)=>`<div class="year${x.key?' key':''}" data-year="${i}"><b>${x.y}</b><span>${x.e[l]}</span></div>`).join('')}</div>`},
 {c:'network',k:{en:'3 · The shared home',fr:'3 · La maison commune'},h:{en:'A shared headquarters combines community legitimacy with research capacity.',fr:'Un siège partagé associe la légitimité communautaire à la capacité de recherche.'},d:{en:'For many member associations, the network now has a real front door.',fr:'Pour de nombreuses associations membres, le réseau a désormais une vraie porte d’entrée.'},src:{en:'Codiasco–CSA protocol and inauguration record, 20 May 2026',fr:'Protocole Codiasco–CSA et inauguration, 20 mai 2026'},note:{en:'1.25 min · This is the quiet, human slide. The real photograph should eventually dominate; in this no-image proposal, the architecture itself carries the idea.',fr:'1,25 min · C’est la diapositive calme et humaine. La vraie photographie devra finalement dominer ; dans cette proposition sans images, l’architecture porte l’idée.'},img:{en:'Wide candid from the 20 May 2026 inauguration at Piazza della Repubblica 6, ideally showing Codiasco members, CSA/CESPI actors and the physical space together. Avoid ribbon-cutting if it hides the community.',fr:'Photo large et spontanée de l’inauguration du 20 mai 2026, Piazza della Repubblica 6, montrant si possible membres de Codiasco, acteurs CSA/CESPI et espace physique. Éviter le ruban si la communauté disparaît.'},body:l=>`<div class="house"><div class="pillar"><h3>${l==='en'?'Community legitimacy':'Légitimité communautaire'}</h3><p>${l==='en'?'Member associations bring lived knowledge, languages, trust and direct accountability to communities.':'Les associations apportent expérience vécue, langues, confiance et responsabilité directe envers les communautés.'}</p><div class="network-mini">${'<i></i>'.repeat(8)}</div></div><div class="roof"><small>20 · 05 · 2026</small><b>Piazza della<br>Repubblica 6</b><span>${l==='en'?'meeting · training · secretariat<br><em>Porta Palazzo, Turin</em>':'réunion · formation · secrétariat<br><em>Porta Palazzo, Turin</em>'}</span></div><div class="pillar right"><h3>${l==='en'?'Research capacity':'Capacité de recherche'}</h3><p>${l==='en'?'A shared roof with CSA and CESPI links community evidence to analysis, project design and public institutions.':'Un toit partagé avec le CSA et le CESPI relie les preuves communautaires à l’analyse, aux projets et aux institutions publiques.'}</p><div class="research-lines"><i></i><i></i><i></i></div></div></div>`},
 {c:'levels',k:{en:'4 · Multilevel action',fr:'4 · Action multiniveau'},h:{en:'At six levels, Codiasco repeats one operating grammar: agreement → project → result.',fr:'À six niveaux, Codiasco répète la même grammaire : accord → projet → résultat.'},d:{en:'Influence becomes concrete when each relationship produces an operating mechanism.',fr:'L’influence devient concrète quand chaque relation produit un mécanisme d’action.'},src:{en:'Codiasco agreements and project records, 2023–2026',fr:'Accords et projets Codiasco, 2023–2026'},note:{en:'2 min · Read two rows only—City and International—then let the audience scan the others. For the metropolitan level, name the cities’ needs forum as work in preparation, not a completed result.',fr:'2 min · Lire seulement deux lignes — Ville et International — puis laisser le public parcourir les autres. Au niveau métropolitain, présenter le forum des besoins comme travail en préparation.'},img:{en:'Optional evidence image: close crop of an actual signed agreement (City of Turin or CSA), showing date and signatures while respecting personal-data limits. No handshake stock photo.',fr:'Image de preuve facultative : recadrage d’un accord réellement signé (Ville de Turin ou CSA), avec date et signatures dans le respect des données personnelles. Pas de poignée de main de stock.'},body:l=>{const rows=l==='en'?[['Neighbourhood','Shared headquarters','Daily access'],['City','Framework agreement 2023','AI course + multilingual chatbot'],['Metropolitan','Framework agreement 2025','Cities’ needs forum in preparation'],['Region','Pra.TO co-funding','Diaspora & Cooperation forum'],['National','CIDCI · AICS · IOM','Toward a National Diaspora Forum'],['International','Oxfam partnership · ITCILO','TILILA restitution · second ALM']]:[['Quartier','Siège partagé','Accès quotidien'],['Ville','Accord-cadre 2023','Cours IA + chatbot multilingue'],['Métropole','Accord-cadre 2025','Forum des besoins en préparation'],['Région','Cofinancement Pra.TO','Forum Diaspora & Coopération'],['National','CIDCI · AICS · OIM','Vers un Forum national des diasporas'],['International','Partenariat Oxfam · ITCILO','Restitution TILILA · deuxième ALM']];return `<div class="levels"><div class="head"></div><div class="head">${l==='en'?'Agreement':'Accord'}</div><div class="head">${l==='en'?'Project / mechanism':'Projet / mécanisme'}</div><div class="head">${l==='en'?'Result':'Résultat'}</div>${rows.map((r,i)=>`<div class="lev${i===1||i===5?' focus':''}">${r[0]}</div><div class="${i===1||i===5?'focus':''}">${r[1]} <span class="arrow">→</span></div><div class="${i===1||i===5?'focus':''}">${r[2]}</div><div class="${i===1||i===5?'focus':''}">${i===0?(l==='en'?'A visible front door':'Une porte visible'):i===1?(l==='en'?'Capability delivered':'Capacité livrée'):i===2?(l==='en'?'Needs aggregated':'Besoins agrégés'):i===3?(l==='en'?'Policy dialogue':'Dialogue politique'):i===4?(l==='en'?'National coordination':'Coordination nationale'):(l==='en'?'Two-territory delivery':'Action sur deux territoires')}</div>`).join('')}</div>`}},
 {c:'project',k:{en:'5 · Cooperation in both directions',fr:'5 · Coopération dans les deux sens'},h:{en:'Diaspora networks make cooperation produce value on both sides.',fr:'Les réseaux diasporiques font produire de la valeur à la coopération des deux côtés.'},d:{en:'The portfolio connects Piedmont’s project capacity with trust, context and talent in origin territories.',fr:'Le portefeuille relie la capacité de projet du Piémont à la confiance, au contexte et aux talents des territoires d’origine.'},src:{en:'Codiasco project portfolio · Plural Path Map dataset v0, 2020–2026',fr:'Portefeuille de projets Codiasco · Plural Path Map v0, 2020–2026'},note:{en:'1.5 min · The route changes automatically every 20 seconds: Praia, Marrakech, Acre. Say what each side contributes. Acre is evidence-partial; confirm the current project stage before public publication.',fr:'1,5 min · Le parcours change automatiquement toutes les 20 secondes : Praia, Marrakech, Acre. Dire ce que chaque côté apporte. Les données Acre sont partielles ; confirmer l’étape avant publication.'},img:{en:'No photograph required. Keep the native route map. If one image is later used, choose a real agriculture or food-systems activity from Pra.TO, TILILA or the Acre coffee work; caption place, activity and year.',fr:'Aucune photographie nécessaire. Conserver la carte de parcours native. Si une image est ajoutée, choisir une activité réelle liée à l’agriculture ou aux systèmes alimentaires dans Pra.TO, TILILA ou le café de l’Acre ; légender lieu, activité et année.'},body:l=>`<div class="route-map"><div class="mapframe"><svg viewBox="0 0 900 460" role="img" aria-label="Routes from Turin to Praia, Marrakech and Acre"><path class="land" d="M80 86l110-42 105 27 70 70-40 63-100 22-69-43-72-30zM420 55l100-24 94 25 62 57-22 54-74 9-27 81-64-12-44-75-52-42zM318 250l89-23 65 43-7 118-55 52-54-76-53-52zM620 204l110-43 89 51-13 64-86 35-83-38z"/><path id="route0" class="route" d="M520 135 Q420 210 330 285"/><path id="route1" class="route" d="M520 135 Q505 190 480 255"/><path id="route2" class="route" d="M520 135 Q360 250 260 370"/><circle class="origin" cx="520" cy="135" r="9"/><text class="maplabel" x="535" y="130">Torino</text><circle id="end0" class="endpoint" cx="330" cy="285" r="8"/><text class="maplabel" x="270" y="315">Praia</text><text class="mapmicro" x="270" y="333">Pra.TO</text><circle id="end1" class="endpoint" cx="480" cy="255" r="8"/><text class="maplabel" x="495" y="255">Marrakech</text><text class="mapmicro" x="495" y="273">TILILA</text><circle id="end2" class="endpoint" cx="260" cy="370" r="8"/><text class="maplabel" x="180" y="398">Acre</text><text class="mapmicro" x="180" y="416">Caffè dell’Acre</text></svg></div><div class="routes-copy">${[['Pra.TO','Cape Verde',l==='en'?'Youth, environment and sustainable urban spaces':'Jeunesse, environnement et espaces urbains durables'],['TILILA','Morocco',l==='en'?'Economic recovery, financial capability and diaspora mobilisation':'Reprise économique, capacité financière et mobilisation diasporique'],["Caffè dell’Acre",'Brazil',l==='en'?'Coffee quality, producer links and a bridge to Turin’s value chain':'Qualité du café, liens avec les producteurs et pont vers la filière turinoise']].map((x,i)=>`<article class="project" data-project="${i}"><p class="eyebrow">${x[1]}</p><h3>${x[0]}</h3><p>${x[2]}</p></article>`).join('')}<div class="exchange"><span><b>Piemonte</b><br>${l==='en'?'project design · institutions · markets':'projets · institutions · marchés'}</span><i>⇄</i><span><b>${l==='en'?'Origin':'Origine'}</b><br>${l==='en'?'context · trust · talent':'contexte · confiance · talents'}</span></div><div class="autocue"><i></i><span>${L[l].auto}</span></div></div></div>`},
 {c:'project',k:{en:'5 · Flagship project · Morocco',fr:'5 · Projet phare · Maroc'},h:{en:'TILILA links Morocco’s recovery, Turin’s diaspora and Italian public finance in one chain.',fr:'TILILA relie dans une même chaîne la reprise au Maroc, la diaspora à Turin et le financement public italien.'},d:{en:'The chain closes in Marrakech on 27 July 2026.',fr:'La chaîne se boucle à Marrakech le 27 juillet 2026.'},src:{en:'Codiasco–Oxfam partnership agreement, February 2025 · Amajou confirmation, 20 July 2026',fr:'Accord de partenariat Codiasco–Oxfam, février 2025 · Confirmation Amajou, 20 juillet 2026'},note:{en:'1.75 min · Tell this as a chain of value, not a list of partners. The closing proof is Codiasco’s confirmed presence at the Marrakech restitution.',fr:'1,75 min · Raconter une chaîne de valeur, pas une liste de partenaires. La preuve finale est la présence confirmée de Codiasco à la restitution de Marrakech.'},img:{en:'Primary recommendation: field photograph from TILILA showing Moroccan artisans, producers or the financial-training activity—place and people, not a logo wall. Secondary option: the 27 July Marrakech event poster as documentary evidence.',fr:'Recommandation principale : photo de terrain TILILA montrant artisans, producteurs ou formation financière — lieu et personnes, pas un mur de logos. Option secondaire : affiche de l’événement de Marrakech du 27 juillet comme preuve documentaire.'},body:l=>`<div class="tilila"><div class="tilila-place"><small>${l==='en'?'Evidence now':'La preuve maintenant'}</small><b>27 · 07</b><span>Marrakech · 2026<br>${l==='en'?'restitution + launch':'restitution + lancement'}</span></div><div class="case-chain">${(l==='en'?[['Need','Economic activity hit by the earthquakes'],['Finance','AICS · Promossi 2023'],['Partnership','Oxfam Italia · Morocco partners'],['Diaspora','Entrepreneurs, networks, trust'],['Delivery','French-language training + skill-gap analysis']]:[['Besoin','Activité économique touchée par les séismes'],['Financement','AICS · Promossi 2023'],['Partenariat','Oxfam Italia · partenaires marocains'],['Diaspora','Entrepreneurs, réseaux, confiance'],['Action','Formation en français + analyse des compétences']]).map((x,i)=>`<div class="case-step"><em>${String(i+1).padStart(2,'0')}</em><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div></div>`},
 {c:'project',k:{en:'5 · Assets that travel',fr:'5 · Des actifs qui circulent'},h:{en:'Diaspora assets become value chains, public memory and anti-discrimination capacity.',fr:'Les actifs diasporiques deviennent filières, mémoire publique et capacité contre les discriminations.'},d:{en:'Cultural return is an operating asset, not folklore.',fr:'Le retour culturel est un actif opérationnel, pas du folklore.'},src:{en:'Codiasco project records: Caffè dell’Acre · Storie da Asporto · TUAS, 2022–2026',fr:'Projets Codiasco : Caffè dell’Acre · Storie da Asporto · TUAS, 2022–2026'},note:{en:'1.75 min · Three verbs, three outcomes. Confirm the present stage of Caffè dell’Acre before public publication; the historical delegation, quality analysis and university bridge are the evidence used here.',fr:'1,75 min · Trois verbes, trois résultats. Confirmer l’étape actuelle de Caffè dell’Acre avant publication ; la délégation, l’analyse qualité et le pont universitaire sont les preuves utilisées ici.'},img:{en:'One three-frame documentary sequence only if available: Acre coffee producers/product; a Storie da Asporto neighbourhood recording; a TUAS school or activist-training moment. Each frame needs project, place, year and consent.',fr:'Une séquence documentaire de trois images seulement si disponible : producteurs/café de l’Acre ; enregistrement de quartier Storie da Asporto ; activité scolaire ou formation TUAS. Chaque image doit indiquer projet, lieu, année et consentement.'},body:l=>`<div class="portfolio"><div class="portfolio-row"><div class="verb">${l==='en'?'Trade':'Échanger'}</div><h3>Caffè dell’Acre</h3><p>${l==='en'?'Producer delegation → quality analysis → university bridge → access to Turin’s value chain.':'Délégation de producteurs → analyse qualité → pont universitaire → accès à la filière turinoise.'}</p></div><div class="portfolio-row"><div class="verb">${l==='en'?'Archive':'Archiver'}</div><h3>Storie da Asporto</h3><p>${l==='en'?'Migrant entrepreneurs’ stories → digital public memory → neighbourhood events.':'Récits d’entrepreneurs migrants → mémoire publique numérique → événements de quartier.'}</p></div><div class="portfolio-row"><div class="verb">${l==='en'?'Reframe':'Recadrer'}</div><h3>TUAS</h3><p>${l==='en'?'Narrative change → activist training → anti-discrimination work in schools.':'Changement de récit → formation d’activistes → action contre les discriminations dans les écoles.'}</p></div></div>`},
 {c:'all',cls:'cta',k:{en:'From presentation to partnership',fr:'De la présentation au partenariat'},h:{en:'Your diaspora is already a development partner — Codiasco can help organize the bridge.',fr:'Votre diaspora est déjà un partenaire de développement — Codiasco peut aider à organiser le pont.'},d:{en:'One contact today can become a live conversation in August and co-design work in Turin in September.',fr:'Un contact aujourd’hui peut devenir une rencontre en ligne en août puis un travail de co-conception à Turin en septembre.'},src:{en:'Codiasco initiative plan, 21 July 2026 · no Slow Food brand assets used',fr:'Plan de l’initiative Codiasco, 21 juillet 2026 · aucun élément de marque Slow Food utilisé'},note:{en:'1.25 min + buffer · The CTA is the conclusion. Say the e-mail aloud; the QR code is intentionally absent until a verified contact form exists. Describe September prudently as a Codiasco initiative in the frame of Terra Madre Off.',fr:'1,25 min + marge · Le CTA est la conclusion. Dire l’e-mail à voix haute ; le QR est volontairement absent jusqu’à l’existence d’un formulaire vérifié. Décrire septembre avec prudence comme une initiative Codiasco dans le cadre de Terra Madre Off.'},img:{en:'No photograph required. Add only: verified QR code to the contact form; official Codiasco logo; ITCILO logo in the event lock-up. Do not add Terra Madre/Slow Food brand assets without explicit authorization.',fr:'Aucune photographie nécessaire. Ajouter seulement : QR vérifié vers le formulaire ; logo officiel Codiasco ; logo ITCILO dans le cartouche événement. Ne pas ajouter les marques Terra Madre/Slow Food sans autorisation explicite.'},body:l=>`<div class="cta-grid"><div class="cta-steps"><div class="cta-step"><b>01</b><h3>${l==='en'?'Leave a contact today':'Laissez un contact aujourd’hui'}</h3><p>${l==='en'?'Start with one territory, one diaspora organization and one shared question.':'Commencez par un territoire, une organisation diasporique et une question partagée.'}</p></div><div class="cta-step"><b>02</b><h3>${l==='en'?'Join the August live session':'Participez à la session d’août'}</h3><p>${l==='en'?'Compare needs, capabilities and the first project pathway.':'Comparez besoins, capacités et première trajectoire de projet.'}</p></div><div class="cta-step"><b>03</b><h3>${l==='en'?'Meet the Turin desk in September':'Rencontrez le desk à Turin en septembre'}</h3><p>${l==='en'?'A Codiasco initiative in the frame of Terra Madre Off.':'Une initiative Codiasco dans le cadre de Terra Madre Off.'}</p></div></div><div class="contact"><p class="eyebrow">CODIASCO · TORINO</p><div class="mail">info@codiasco.org</div><p>Piazza della Repubblica 6<br>Torino, Italia</p><button id="copyMail">${L[l].copy}</button></div></div>`}
];
let lang='en',current=0,t0=null,timerId=null,autoId=null,ppmI=0,yearI=0,routeI=0,isMobile=matchMedia('(max-width:720px)').matches;
const deck=document.getElementById('deck'),curEl=document.getElementById('cur'),progress=document.getElementById('progress'),announce=document.getElementById('announce');
function rail(active){return `<div class="chapter-rail${active==='all'?' all':''}" data-chapter="${active}">${Object.entries(chapters).map(([k,v])=>`<div class="chapter-dot${active==='all'||active===k?' on':''}" data-n="${v.n[lang]}">${I(v.i)}</div>`).join('')}</div>`}
function render(){document.documentElement.lang=lang;document.querySelectorAll('[data-ui]').forEach(el=>el.textContent=L[lang][el.dataset.ui]);deck.innerHTML=slides.map((s,i)=>`<section class="slide ${s.cls||''}${i===current?' active':''}" data-slide="${i}" aria-label="${i+1} of ${slides.length}"><header class="mast"><div class="wordmark">CODIASCO<i></i></div><div class="event">ITCILO · ALM 2026</div>${rail(s.c)}</header>${s.cls==='cover'?`<div class="stage">${s.body(lang)}</div>`:`<p class="eyebrow">${s.k[lang]}</p><h1 class="headline">${s.h[lang]}</h1><p class="deckline">${s.d[lang]}</p><div class="stage">${s.body(lang)}</div>`}<div class="source">${s.src[lang]}</div><div class="slide-no">${String(i+1).padStart(2,'0')}</div></section>`).join('');document.getElementById('total').textContent=slides.length;document.getElementById('lang').textContent=lang==='en'?'FR':'EN';bindDynamic();buildMenu();buildImages();update();if(isMobile)setupObserver()}
function bindDynamic(){document.querySelectorAll('[data-ppm]').forEach(el=>el.onclick=()=>{ppmI=+el.dataset.ppm;drawPPM()});document.querySelectorAll('[data-year]').forEach(el=>el.onclick=()=>{yearI=+el.dataset.year;drawYear()});const c=document.getElementById('copyMail');if(c)c.onclick=async()=>{try{await navigator.clipboard.writeText('info@codiasco.org');c.textContent=L[lang].copied}catch{c.textContent='info@codiasco.org'}};drawPPM();drawYear();drawRoute()}
function update(){document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active',isMobile||i===current));curEl.textContent=current+1;progress.style.width=((current+1)/slides.length*100)+'%';announce.textContent=`${current+1}/${slides.length}: ${strip(slides[current].h[lang])}`;document.getElementById('notesTitle').textContent=`${current+1}/${slides.length} — ${strip(slides[current].h[lang])}`;document.getElementById('notesText').textContent=slides[current].note[lang];startAuto();if(!t0&&current>0)startTimer()}
function go(i){current=Math.max(0,Math.min(slides.length-1,i));if(isMobile){update();document.querySelector(`[data-slide="${current}"]`).scrollIntoView({behavior:matchMedia('(prefers-reduced-motion:reduce)').matches?'auto':'smooth'})}else update()}
function startAuto(){clearInterval(autoId);if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;if(current===4){drawPPM();autoId=setInterval(()=>{ppmI=(ppmI+1)%ppm.length;drawPPM()},20000)}else if(current===5){drawYear();autoId=setInterval(()=>{yearI=(yearI+1)%years.length;drawYear()},20000)}else if(current===8){drawRoute();autoId=setInterval(()=>{routeI=(routeI+1)%3;drawRoute()},20000)}}
function drawPPM(){document.querySelectorAll('[data-ppm]').forEach((x,i)=>x.classList.toggle('on',i===ppmI));const x=ppm[ppmI],a=document.getElementById('ppmStage');if(!a)return;a.textContent=`${String(ppmI+1).padStart(2,'0')} · ${x.t[lang]}`;document.getElementById('ppmTitle').textContent=x.s[lang];document.getElementById('ppmScope').textContent=x.e[lang];document.getElementById('ppmEvidence').textContent=x.e[lang];document.getElementById('ppmOrder').textContent=`${ppmI+1} / 6`}
function drawYear(){document.querySelectorAll('[data-year]').forEach((x,i)=>x.classList.toggle('on',i===yearI))}
function drawRoute(){for(let i=0;i<3;i++){document.getElementById('route'+i)?.classList.toggle('on',i===routeI);document.getElementById('end'+i)?.classList.toggle('on',i===routeI)}document.querySelectorAll('[data-project]').forEach((x,i)=>x.classList.toggle('on',i===routeI))}
function buildMenu(){document.getElementById('menuList').innerHTML=slides.map((s,i)=>`<button data-go="${i}"><span>${String(i+1).padStart(2,'0')}</span><strong>${strip(s.h[lang])}</strong></button>`).join('');document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{document.getElementById('menuDialog').close();go(+b.dataset.go)})}
function buildImages(){document.getElementById('imageList').innerHTML=slides.map((s,i)=>`<article class="image-item"><b>${String(i+1).padStart(2,'0')} · ${strip(s.h[lang])}</b><p>${s.img[lang]}</p></article>`).join('')}
function strip(x){const d=document.createElement('div');d.innerHTML=x;return d.textContent}
function startTimer(){if(t0)return;t0=Date.now();timerId=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000),m=String(Math.floor(s/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0'),el=document.getElementById('timer');el.textContent=`${m}:${ss}`;el.classList.toggle('warn',s>=18*60+30)},1000)}
function toggleNotes(v){const n=document.getElementById('notes'),open=v??!n.classList.contains('open');n.classList.toggle('open',open);n.setAttribute('aria-hidden',String(!open))}
function setupObserver(){const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting&&e.intersectionRatio>.55){current=+e.target.dataset.slide;update()}}),{threshold:[.55]});document.querySelectorAll('.slide').forEach(x=>obs.observe(x))}
document.getElementById('prev').onclick=()=>go(current-1);document.getElementById('next').onclick=()=>go(current+1);document.querySelector('.navzone.prev').onclick=()=>go(current-1);document.querySelector('.navzone.next').onclick=()=>go(current+1);
document.getElementById('lang').onclick=()=>{lang=lang==='en'?'fr':'en';render()};document.getElementById('menuBtn').onclick=()=>document.getElementById('menuDialog').showModal();document.getElementById('imagesBtn').onclick=()=>document.getElementById('imagesDialog').showModal();document.getElementById('notesBtn').onclick=()=>toggleNotes();document.getElementById('notesClose').onclick=()=>toggleNotes(false);document.getElementById('fsBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.close).close());
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){if(!e.target.closest('button,dialog'))go(current+1)}else if(e.key==='ArrowLeft'||e.key==='PageUp')go(current-1);else if(e.key==='Home')go(0);else if(e.key==='End')go(slides.length-1);else if(e.key.toLowerCase()==='l'){lang=lang==='en'?'fr':'en';render()}else if(e.key.toLowerCase()==='n')toggleNotes();else if(e.key==='Escape')toggleNotes(false)});
let touchY=0;document.addEventListener('touchstart',e=>touchY=e.changedTouches[0].clientY,{passive:true});document.addEventListener('touchend',e=>{if(!isMobile)return;const dy=e.changedTouches[0].clientY-touchY;if(Math.abs(dy)>70)go(current+(dy<0?1:-1))},{passive:true});
matchMedia('(max-width:720px)').addEventListener('change',e=>{isMobile=e.matches;render()});render();
</script>
<script>
function groupCapabilityIntro(){
  const intro=document.querySelector('.cover-copy>.deckline');
  const capabilityList=document.querySelector('.five-path');
  if(intro&&capabilityList){intro.classList.add('path-intro');capabilityList.prepend(intro)}
}
function enhanceBusinessComparison(){
  const plot=document.querySelector('.dotplot');
  if(!plot)return;
  const l=document.documentElement.lang;
  const italy=plot.querySelector('.dotlabel.italy');
  const turin=plot.querySelector('.dotlabel.turin');
  const axis=plot.querySelector('.axis');
  if(italy&&italy.dataset.lang!==l){italy.textContent=l==='fr'?'Italie (moyenne)':'Italy (average)';italy.dataset.lang=l}
  if(turin&&turin.dataset.lang!==l){turin.textContent='Turin';turin.dataset.lang=l}
  let title=axis?.querySelector('.axis-title');
  if(axis&&!title){title=document.createElement('b');title.className='axis-title';axis.append(title)}
  if(title)title.textContent=l==='fr'?'Comparaison des entreprises dirigées par des migrants':'Migrant-led businesses comparison';
  plot.setAttribute('aria-label',l==='fr'?'Comparaison des entreprises dirigées par des migrants : Turin, 21 % du total des entreprises ; moyenne italienne, 12 %.':'Migrant-led businesses comparison: Turin, 21% of total businesses; Italy average, 12%.');
}
function refineRenderedSlides(){groupCapabilityIntro();enhanceBusinessComparison()}
refineRenderedSlides();
new MutationObserver(refineRenderedSlides).observe(document.getElementById('deck'),{childList:true});
</script>
</body>
</html>
